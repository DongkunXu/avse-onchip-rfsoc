data:
  root_dir: "/path/to/LRS3_dataset"
  batch_size: 96
  num_workers: 16
  init_workers: 24
  pin_memory: true
  prefetch_factor: 2

  
  # Window settings for dataset preparation
  window_duration: 1.20    # 1200ms total window for enhanced context
  overlap_ratio: 0.20      # 20% overlap between windows

video:
  fps: 25
  input_size: [96, 96]
  source_size: [224, 224]  # Raw dataset frame size; resampled to input_size in dataset preprocessing
  frames_per_chunk: 29    # 1160ms (1.2s - 40ms future)
  future_frames: 1        # 40ms

audio:
  sample_rate: 16000
  chunk_size: 800         # 50ms
  context_size: 18560     # 1160ms (1.2s - 40ms future)
  future_samples: 640     # 40ms

model:
  # 2026-04-29 HW-friendly Tier D: aggressive cut for ZU48DR fit.
  # Tier C still over LUT at HLS (430%), unlikely Vivado P&R closes that gap.
  # Tier D: video_layers 4→3, video_channels 192→128, audio_layers 6→5,
  # audio_channels 256→192, kernel_sizes 25% smaller, fusion_dim 128→64,
  # plus fusion enhancement_net + norm2 removed (see fusion.py).
  # Estimated SI-SDR loss vs Tier C: ~1.5 dB. U-Net skips preserve detail.
  video_channels: 96     # was 128 (Tier E.1: -25% for DFX RR fit)
  video_layers: 3        # was 4 (V4 dropped)
  audio_channels: 192    # was 256
  audio_layers: 5        # was 6 (deepest stage dropped)
  kernel_sizes: [19, 15, 11, 9, 7]   # was [25,19,15,11,7,5], 25% smaller, 5 entries
  strides: [2, 2, 2, 2, 2]
  fusion_dim: 64         # was 128
  fusion_heads: 4
  fusion_dropout: 0.08

training:
  max_epochs: 60
  learning_rate: 0.00008
  weight_decay: 0.0002
  gradient_clip: 1.0
  warmup_steps: 1500

loss:
  l1_weight: 1.0           # 0-1      /0.1
  l2_weight: 1.0           # 0-1      /0.05
  multiscale_weight: 1.0   # 0-1      /0.1
  si_sdr_weight: 0.4       # -25-10   /-10
  stoi_weight: 5.0         # -1-0     /-1
  pesq_weight: 0.8         # -4.5-0.5 /-4
  stft_weight: 0.8         # multi-resolution STFT log-mag L1 loss
